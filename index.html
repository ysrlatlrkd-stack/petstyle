<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>펫스타일 매칭 플랫폼</title>
    <meta name="description" content="우리 댕댕이를 위한 완벽한 스타일, 펫스타일 미용실 매칭 플랫폼.">
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="app">
        <!-- Header -->
        <header class="glass-header">
            <div class="header-container">
                <a href="#" class="logo" onclick="window.app.navigate('home')">
                    <i class="ri-scissors-2-fill"></i> PetStyle
                </a>
                <nav class="nav-links">
                    <a href="#" class="nav-link active">홈</a>
                    <a href="#" class="nav-link">추천 매장</a>
                    <a href="#" class="nav-link">내 주변 찾기</a>
                    <a href="#" class="nav-link">마이페이지</a>
                </nav>
                <button class="btn-primary login-btn">로그인</button>
            </div>
        </header>

        <!-- Main Content Area (Dynamic) -->
        <main id="main-content">
            <!-- Content will be injected by app.js -->
        </main>

        <!-- Footer -->
        <footer>
            <div class="footer-content">
                <div class="footer-logo">PetStyle</div>
                <p>소중한 반려견을 위한 최적의 미용실 매칭 서비스</p>
                <div class="footer-links">
                    <a href="#">이용약관</a>
                    <a href="#">개인정보처리방침</a>
                    <a href="#">고객센터</a>
                </div>
            </div>
        </footer>
    </div>
    <script src="app.js"></script>
</body>
</html>
